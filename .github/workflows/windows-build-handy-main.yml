name: "Windows Build (Handy-main)"

"on":
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Handy-main/**"
      - ".github/workflows/windows-build-handy-main.yml"

jobs:
  build-windows-handy-main:
    runs-on: windows-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: Handy-main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./Handy-main/src-tauri -> target"
          key: windows-handy-main-x86_64-pc-windows-msvc

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Install frontend dependencies
        run: bun install

      - name: Build with Tauri (Windows x64)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handy-main-windows-x64
          path: |
            Handy-main/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            Handy-main/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30
